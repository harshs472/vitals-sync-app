name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug 2>&1 || true

      - name: Show full log
        run: ./gradlew assembleDebug --info 2>&1 | grep -E "(error|Error|cannot|unresolved)" | head -50

      - name: Find APK
        run: find . -name "*.apk" -type f

      - name: List build outputs
        run: find . -name "*.apk" -o -name "*.aab" | head -20

      - name: List app build dir
        run: ls -la app/build/outputs/ || echo "outputs dir not found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vitals-sync-debug
          path: "**/*.apk"
